services:
  server:
    build:
      context: .
      dockerfile: server.dockerfile
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-}
    volumes:
      - atomic-data:/data
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web.dockerfile
    networks:
      - internal
    restart: unless-stopped

  proxy:
    image: nginx:1.28-bookworm
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/atomic.conf:ro
    networks:
      - internal
    depends_on:
      - server
      - web
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3
    profiles:
      - backup
    volumes:
      - atomic-data:/data
      - ./docker/litestream.yml:/etc/litestream.yml:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID
      - LITESTREAM_SECRET_ACCESS_KEY
      - LITESTREAM_BUCKET
      - LITESTREAM_ENDPOINT
      - LITESTREAM_PATH
    entrypoint: ["litestream", "replicate", "-config", "/etc/litestream.yml"]
    depends_on:
      - server
    networks:
      - internal
    restart: unless-stopped

volumes:
  atomic-data:

networks:
  internal:
