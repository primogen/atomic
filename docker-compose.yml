services:
  server:
    build:
      context: .
      target: server
    environment:
      # Set to your domain to enable OAuth/MCP for Claude.ai:
      # PUBLIC_URL: https://atomic.example.com
      - PUBLIC_URL=${PUBLIC_URL:-}
    volumes:
      - atomic-data:/data
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "8080:80"
    networks:
      - internal
    depends_on:
      - server
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3
    profiles:
      - backup
    volumes:
      - atomic-data:/data
      - ./docker/litestream.yml:/etc/litestream.yml:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID
      - LITESTREAM_SECRET_ACCESS_KEY
      - LITESTREAM_BUCKET
      - LITESTREAM_ENDPOINT
      - LITESTREAM_PATH
    entrypoint: ["litestream", "replicate", "-config", "/etc/litestream.yml"]
    depends_on:
      - server
    networks:
      - internal
    restart: unless-stopped

volumes:
  atomic-data:

networks:
  internal:
