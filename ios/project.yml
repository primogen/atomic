name: AtomicMobile
options:
  bundleIdPrefix: com.atomic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 5
    MARKETING_VERSION: "1.0.0"
    INFOPLIST_KEY_CFBundleDisplayName: Atomic
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSCameraUsageDescription: "Atomic needs camera access to scan QR codes for server setup"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Runestone:
    url: https://github.com/simonbs/Runestone
    from: "0.5.0"
  TreeSitterLanguages:
    url: https://github.com/simonbs/TreeSitterLanguages
    from: "0.1.0"

targets:
  AtomicMobile:
    type: application
    platform: iOS
    sources:
      - AtomicMobile
    dependencies:
      - package: MarkdownUI
      - package: Runestone
      - package: TreeSitterLanguages
        product: TreeSitterMarkdownRunestone
      - package: TreeSitterLanguages
        product: TreeSitterMarkdownInlineRunestone
      - target: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atomic.mobile
        INFOPLIST_KEY_CFBundleDisplayName: Atomic
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: D3SX98L77N
        CODE_SIGN_ENTITLEMENTS: AtomicMobile/AtomicMobile.entitlements
        INFOPLIST_FILE: AtomicMobile/Info.plist

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - path: AtomicMobile/SharedConfig.swift
        buildPhase: sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atomic.mobile.share
        INFOPLIST_KEY_CFBundleDisplayName: Save to Atomic
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: D3SX98L77N
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ShareExtension/Info.plist
        CURRENT_PROJECT_VERSION: 5
        MARKETING_VERSION: "1.0.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
