name: AtomicMobile
options:
  bundleIdPrefix: com.atomic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    INFOPLIST_KEY_CFBundleDisplayName: Atomic
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  AtomicMobile:
    type: application
    platform: iOS
    sources:
      - AtomicMobile
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atomic.mobile
        INFOPLIST_KEY_CFBundleDisplayName: Atomic
